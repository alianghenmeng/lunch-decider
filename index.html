<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>今日本命饭</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <main class="machine-page">
    <section class="machine-hero view active" id="viewIntro">
      <div class="ticker" id="ticker">今日饭运加载中...</div>
      <div class="hero-grid">
        <div class="hero-copy">
          <div class="stamp-mini">LUNCH FORTUNE</div>
          <h1>中午<br><em>吃什么？</em></h1>
          <p>你不是缺选择，你是缺一个替你背锅的按钮。现在有了。</p>
        </div>

        <div class="machine" id="machine">
          <div class="halo"></div>
          <div class="ticket ticket-a">摸鱼</div>
          <div class="ticket ticket-b">续命</div>
          <div class="ticket ticket-c">碳水</div>
          <div class="bowl">
            <div class="steam steam-a"></div>
            <div class="steam steam-b"></div>
            <div class="steam steam-c"></div>
            <div class="bowl-rim"></div>
            <div class="bowl-body">
              <span>饭签机</span>
            </div>
          </div>
          <div class="machine-hint" id="machineHint">今日饭运待开签</div>
        </div>
      </div>
    </section>

    <section class="stickers view active" id="viewMood">
      <div class="section-title">
        <span>01</span>
        <h2>选择你的今日症状</h2>
      </div>
      <div class="sticker-grid" id="moodGrid"></div>
    </section>

    <section class="summon view" id="viewSummon">
      <div class="diagnosis" id="diagnosis">确诊：午饭选择困难。</div>
      <button class="draw-btn" id="drawBtn">开饭签</button>
    </section>

    <section class="ritual" id="ritual" hidden>
      <div class="ritual-light"></div>
      <div class="flying-slip slip-1"></div>
      <div class="flying-slip slip-2"></div>
      <div class="flying-slip slip-3"></div>
      <div class="ritual-text" id="ritualText">正在让玄学背锅...</div>
    </section>

    <section class="fortune-result view" id="viewResult">
      <article class="fortune-slip" id="fortuneSlip">
        <div class="paper-grain"></div>
        <div class="result-stamp">饭运<br>显灵</div>
        <div class="result-label">今日本命饭</div>
        <h2 id="mealName">黄焖鸡米饭</h2>
        <div class="power-badge" id="powerBadge">摸鱼续航 +20%</div>
        <p id="verdict">不是我说你，不吃饱哪来的力气摸鱼。</p>
        <div class="charm-row">
          <span id="luckyDo">宜：碳水续命</span>
          <span id="luckyDont">忌：反复横跳</span>
          <span id="luckyFlavor">幸运调味：葱花</span>
        </div>
        <div class="backup" id="backupLine">备胎饭：热汤面 / 麻辣烫</div>
        <div class="action-row">
          <button id="copyBtn">复制去下单</button>
          <button id="acceptBtn">收下这碗命</button>
          <button id="redrawBtn">不服，重摇</button>
        </div>
      </article>
    </section>

    <section class="recent view" id="viewHistory">
      <div class="section-title">
        <span>签</span>
        <h2>最近收下的饭命</h2>
      </div>
      <div id="historyList"></div>
    </section>
  </main>
  <script src="dashboard.js"></script>
</body>
</html>
